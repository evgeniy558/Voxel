services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sphere
      POSTGRES_PASSWORD: sphere
      POSTGRES_DB: sphere
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://sphere:sphere@postgres:5432/sphere?sslmode=disable
      JWT_SECRET: dev-secret-change-in-production
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: sphere-uploads
    depends_on:
      - postgres
      - minio

volumes:
  pgdata:
  miniodata:
